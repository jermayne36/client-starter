name: Deploy Production

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    name: Deploy Production to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/web

      - name: Build project artifacts
        # DATABASE_URL required: Prisma 6 initialises during Next.js page-data collection
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/placeholder"
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/web

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=apps/web)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Post-deploy health check
        run: |
          echo "Checking deployment health at ${{ steps.deploy.outputs.url }}/api/health"
          curl -f --retry 10 --retry-delay 5 --retry-connrefused \
            "${{ steps.deploy.outputs.url }}/api/health" \
            && echo "Health check passed" \
            || { echo "Health check failed after retries"; exit 1; }
