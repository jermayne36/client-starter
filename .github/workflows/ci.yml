name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        # DATABASE_URL required: Prisma 6 initialises at Next.js build time during
        # page-data collection even with serverExternalPackages set. A placeholder
        # URL is sufficient — no real database connection is made during next build.
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/placeholder"
        run: pnpm build
